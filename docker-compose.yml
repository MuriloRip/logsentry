version: '3.8'

services:
  api:
    build: .
    container_name: logsentry-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/logsentry
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - logsentry-network

  db:
    image: postgres:16-alpine
    container_name: logsentry-db
    environment:
      POSTGRES_DB: logsentry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - logsentry-network

volumes:
  postgres_data:

networks:
  logsentry-network:
    driver: bridge
